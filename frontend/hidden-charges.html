<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SubTrack — Hidden Charges</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">💳</div>
        <div>
          <div class="brand-name">SUBTRACK</div>
          <div class="brand-sub">Subscription Intelligence</div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer" id="sidebar-user"></div>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <div>
          <div class="page-title">Hidden Charges</div>
          <div class="page-subtitle">Detect unusual fees and price hikes</div>
        </div>
        <div class="topbar-actions">
          <a href="add-hidden-charge.html" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> Add New
          </a>
        </div>
      </div>
      <div class="page-body">
        <div class="card mb-4">
            <div id="hidden-charges-list"><div class="loading">Loading...</div></div>
        </div>
      </div>
    </main>

    <script src="js/app.js"></script>
    <script>
      Auth.requireAuth();
      initSidebar();
      
      async function loadHiddenCharges() {
        try {
          const data = await Api.get('/hidden-charges');
          const hc = data.data;
          
          if (!hc.length) {
              document.getElementById('hidden-charges-list').innerHTML = '<div class="empty-state"><i class="bi bi-shield-check"></i><p>No hidden charges found.</p></div>';
              return;
          }
          
          document.getElementById('hidden-charges-list').innerHTML = `
            <table class="data-table" style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead style="background: var(--bg-card); border-bottom: 1px solid var(--border);">
                    <tr>
                        <th style="padding: 12px 16px;">Service</th>
                        <th style="padding: 12px 16px;">Type</th>
                        <th style="padding: 12px 16px;">Expected</th>
                        <th style="padding: 12px 16px;">Charged</th>
                        <th style="padding: 12px 16px;">Difference</th>
                        <th style="padding: 12px 16px;">Detected At</th>
                        <th style="padding: 12px 16px;">Status</th>
                    </tr>
                </thead>
                <tbody>
                    ${hc.map(h => `
                        <tr style="border-bottom: 1px solid var(--border);">
                            <td style="padding: 12px 16px;"><strong>${h.service_name}</strong></td>
                            <td style="padding: 12px 16px;">${Fmt.chargeType(h.charge_type)}</td>
                            <td style="padding: 12px 16px;">${Fmt.currency(h.expected_amount)}</td>
                            <td style="padding: 12px 16px;">${Fmt.currency(h.actual_amount)}</td>
                            <td style="padding: 12px 16px;" class="${h.difference > 0 ? "text-red" : "text-green"}">
                                ${h.difference > 0 ? "+" : ""}${Fmt.currency(h.difference)}
                            </td>
                            <td style="padding: 12px 16px;" class="text-muted">${Fmt.date(h.detected_at)}</td>
                            <td style="padding: 12px 16px;">
                                ${h.is_resolved ? '<span class="badge-status badge-active">Resolved</span>' : '<span class="badge-status badge-expired">Unresolved</span>'}
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
          `;
        } catch (err) {
            Toast.error("Failed to load hidden charges: " + err.message);
            document.getElementById('hidden-charges-list').innerHTML = '<div class="empty-state">Error loading hidden charges.</div>';
        }
      }
      
      loadHiddenCharges();
    </script>
  </body>
</html>
