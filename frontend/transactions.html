<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SubTrack — Transactions</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">💳</div>
        <div>
          <div class="brand-name">SUBTRACK</div>
          <div class="brand-sub">Subscription Intelligence</div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer" id="sidebar-user"></div>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <div>
          <div class="page-title">Transactions</div>
          <div class="page-subtitle">View your payment history</div>
        </div>
        <div class="topbar-actions">
          <a href="add-transaction.html" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> Add New
          </a>
        </div>
      </div>
      <div class="page-body">
        <div class="card mb-4">
            <div id="transactions-list"><div class="loading">Loading...</div></div>
        </div>
      </div>
    </main>

    <script src="js/app.js"></script>
    <script>
      Auth.requireAuth();
      initSidebar();
      
      async function loadTransactions() {
        try {
          const params = new URLSearchParams(window.location.search);
          const subId = params.get('sub');
          const path = subId ? `/transactions?subscription_id=${subId}` : '/transactions';
          const data = await Api.get(path);
          const txns = data.data;
          
          if (!txns.length) {
              document.getElementById('transactions-list').innerHTML = '<div class="empty-state"><i class="bi bi-receipt"></i><p>No transactions found.</p></div>';
              return;
          }
          
          document.getElementById('transactions-list').innerHTML = `
            <table class="data-table" style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead style="background: var(--bg-card); border-bottom: 1px solid var(--border);">
                    <tr>
                        <th style="padding: 12px 16px;">Service</th>
                        <th style="padding: 12px 16px;">Date</th>
                        <th style="padding: 12px 16px;">Amount</th>
                        <th style="padding: 12px 16px;">Status</th>
                    </tr>
                </thead>
                <tbody>
                    ${txns.map(t => `
                        <tr style="border-bottom: 1px solid var(--border);">
                            <td style="padding: 12px 16px;"><strong>${t.service_name}</strong></td>
                            <td style="padding: 12px 16px;">${Fmt.date(t.transaction_date)}</td>
                            <td style="padding: 12px 16px; color: var(--accent-cyan);">${Fmt.currency(t.amount, t.currency)}</td>
                            <td style="padding: 12px 16px;">${Fmt.statusBadge(t.status)}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
          `;
        } catch (err) {
            Toast.error("Failed to load transactions: " + err.message);
            document.getElementById('transactions-list').innerHTML = '<div class="empty-state">Error loading transactions.</div>';
        }
      }
      
      loadTransactions();
    </script>
  </body>
</html>
