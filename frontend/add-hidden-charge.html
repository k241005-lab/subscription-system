<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SubTrack — Add Hidden Charge</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">💳</div>
        <div>
          <div class="brand-name">SUBTRACK</div>
          <div class="brand-sub">Subscription Intelligence</div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer" id="sidebar-user"></div>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <div>
          <div class="page-title">Add Hidden Charge</div>
          <div class="page-subtitle">Manually record a hidden fee or overcharge</div>
        </div>
      </div>
      <div class="page-body">
        <div class="card" style="max-width: 600px; padding: 24px;">
            <form id="add-hc-form" onsubmit="submitForm(event)">
                <div class="grid-2" style="margin-bottom: 16px; gap: 16px;">
                    <div>
                        <label style="display:block; margin-bottom: 8px; font-weight: 600;">Subscription ID</label>
                        <input type="number" id="subscription_id" class="form-control" required style="width: 100%;">
                    </div>
                    <div>
                        <label style="display:block; margin-bottom: 8px; font-weight: 600;">Transaction ID</label>
                        <input type="number" id="transaction_id" class="form-control" required style="width: 100%;">
                    </div>
                </div>

                <div style="margin-bottom: 16px;">
                    <label style="display:block; margin-bottom: 8px; font-weight: 600;">Charge Type</label>
                    <select id="charge_type" class="form-control" required style="width: 100%;">
                        <option value="price_increase">Price Increase</option>
                        <option value="duplicate_charge">Duplicate Charge</option>
                        <option value="unexpected_fee">Unexpected Fee</option>
                        <option value="early_renewal">Early Renewal</option>
                        <option value="currency_change">Currency Change</option>
                    </select>
                </div>
                
                <div class="grid-2" style="margin-bottom: 16px; gap: 16px;">
                    <div>
                        <label style="display:block; margin-bottom: 8px; font-weight: 600;">Expected Amount</label>
                        <input type="number" id="expected_amount" step="0.01" class="form-control" required placeholder="0.00" style="width: 100%;">
                    </div>
                    <div>
                        <label style="display:block; margin-bottom: 8px; font-weight: 600;">Actual Amount</label>
                        <input type="number" id="actual_amount" step="0.01" class="form-control" required placeholder="0.00" style="width: 100%;">
                    </div>
                </div>

                <div style="margin-bottom: 16px;">
                    <label style="display:block; margin-bottom: 8px; font-weight: 600;">Description</label>
                    <textarea id="description" class="form-control" rows="3" placeholder="Explain the hidden charge..." style="width: 100%; resize: vertical;"></textarea>
                </div>

                <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px;">
                    <a href="hidden-charges.html" class="btn btn-outline">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Hidden Charge</button>
                </div>
            </form>
        </div>
      </div>
    </main>

    <script src="js/app.js"></script>
    <script>
      Auth.requireAuth();
      initSidebar();
      
      async function submitForm(e) {
          e.preventDefault();
          const body = {
              subscription_id: parseInt(document.getElementById('subscription_id').value),
              transaction_id: parseInt(document.getElementById('transaction_id').value),
              charge_type: document.getElementById('charge_type').value,
              expected_amount: parseFloat(document.getElementById('expected_amount').value),
              actual_amount: parseFloat(document.getElementById('actual_amount').value),
              description: document.getElementById('description').value
          };
          
          try {
              const btn = document.querySelector('button[type="submit"]');
              btn.disabled = true;
              btn.innerText = 'Saving...';
              
              await Api.post('/hidden-charges', body);
              Toast.success('Hidden charge added successfully');
              setTimeout(() => {
                  window.location.href = 'hidden-charges.html';
              }, 1000);
          } catch(err) {
              Toast.error(err.message);
              document.querySelector('button[type="submit"]').disabled = false;
              document.querySelector('button[type="submit"]').innerText = 'Save Hidden Charge';
          }
      }
    </script>
  </body>
</html>
