<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SubTrack — Analytics</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">💳</div>
        <div>
          <div class="brand-name">SUBTRACK</div>
          <div class="brand-sub">Subscription Intelligence</div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer" id="sidebar-user"></div>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <div>
          <div class="page-title">Analytics</div>
          <div class="page-subtitle">Understand your spending habits</div>
        </div>
      </div>
      <div class="page-body">
        <div class="grid-2 mb-4">
            <div class="card">
                <div class="card-header"><span class="card-title">Spending by Category</span></div>
                <div class="card-body" id="category-bars"><div class="loading">Loading...</div></div>
            </div>
            <div class="card">
                <div class="card-header"><span class="card-title">Monthly Trend (Last 6 Months)</span></div>
                <div class="card-body" id="monthly-trend"><div class="loading">Loading...</div></div>
            </div>
        </div>
      </div>
    </main>

    <script src="js/app.js"></script>
    <script>
      Auth.requireAuth();
      initSidebar();
      
      async function loadAnalytics() {
        try {
          const data = await Api.get('/transactions/analytics');
          const cats = data.data.byCategory;
          const trend = data.data.trend;
          
          if (cats && cats.length) {
            const max = Math.max(...cats.map((c) => c.total_spent));
            document.getElementById("category-bars").innerHTML = cats
              .map(
                (c) => `
                <div style="margin-bottom:16px">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
                        <div style="display:flex;align-items:center;gap:8px">
                            <i class="bi ${c.icon}" style="color:${c.color};font-size:14px"></i>
                            <span style="font-size:13px;font-weight:600">${c.category}</span>
                            <span class="text-muted text-sm">(${c.sub_count} sub${c.sub_count !== 1 ? "s" : ""})</span>
                        </div>
                        <strong style="font-size:13px">${Fmt.currency(c.total_spent)}</strong>
                    </div>
                    <div style="height:6px;background:var(--border);border-radius:10px;overflow:hidden">
                        <div style="height:100%;width:${((c.total_spent / max) * 100).toFixed(1)}%;
                            background:${c.color};border-radius:10px;transition:width 0.8s ease"></div>
                    </div>
                </div>`
              ).join("");
          } else {
              document.getElementById("category-bars").innerHTML = '<div class="empty-state">No category data</div>';
          }

          if (trend && trend.length) {
              const maxTrend = Math.max(...trend.map(t => t.total));
              document.getElementById("monthly-trend").innerHTML = `
                <div style="display:flex; align-items: flex-end; gap: 10px; height: 200px; padding-top: 20px;">
                    ${trend.map(t => `
                        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end;">
                            <div style="font-size: 11px; margin-bottom: 5px;">${Fmt.currency(t.total)}</div>
                            <div style="width: 100%; max-width: 40px; height: ${((t.total / maxTrend) * 150)}px; background: var(--accent-cyan); border-radius: 4px 4px 0 0;"></div>
                            <div style="font-size: 11px; margin-top: 8px; color: var(--text-muted);">${t.month}</div>
                        </div>
                    `).join('')}
                </div>
              `;
          } else {
              document.getElementById("monthly-trend").innerHTML = '<div class="empty-state">No trend data</div>';
          }
          
        } catch (err) {
            Toast.error("Failed to load analytics: " + err.message);
            document.getElementById('category-bars').innerHTML = '<div class="empty-state">Error</div>';
            document.getElementById('monthly-trend').innerHTML = '<div class="empty-state">Error</div>';
        }
      }
      
      loadAnalytics();
    </script>
  </body>
</html>
